<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=divice-width, initial-scale=1.0">
            <Title>Login</Title>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
            <link rel="stylesheet" href="style.css">
        </head>
        <body id="login_page">

            <div class="container_login" id="container_login">
                <div class="form-container sign-up">
                    <form>
                        <h1>Create Account</h1>
                        <div class="social-icons">
                            <a href="#" class="icon">
                                <i class="fa-brands fa-apple"></i>
                            </a>
                        </div>
                        <span>Register with Email</span>
                        <input type="text" placeholder="first name"> <!--First Name-->
                        <input type="text" placeholder="last name"> <!--Last Name-->
                        <input type="email" placeholder="Eamil"> <!--Email-->
                        <input type="tel" placeholder="Phone"> <!--Phone number-->
                        <input type="password" placeholder="Password"> <!--Password-->
                        <button>Sign up</button>
                    </form>
                </div>
                <div class="form-container sign-in">
                    <form>
                        <h1>Login</h1>
                        <div class="social-icons">
                            <a href="#" class="icon">
                                <i class="fa-brands fa-apple"></i>
                            </a>
                        </div>
                        <span>Login with Email</span>
                        <input type="email" placeholder="Eamil"> <!--Email-->
                        <input type="password" placeholder="Password"> <!--Password-->
                        <a href="#">Forgot your password</a>
                        <button>Sign In</button>
                    </form>
                </div>
                <div class="toggle-container">
                    <div class="toggle">
                        <div class="toggle-panel toggle-left">
                            <h1>Glad to work with you again</h1>
                            <p>enter your personal information</p>
                            <button class="hidden" id="Login">Sign In</button>
                        </div>
                        <div class="toggle-panel toggle-right">
                            <h1>Welcome. I'm glad to start working with you</h1>
                            <p>Register your personal information</p>
                            <button class="hidden" id="Register">Sign Up</button>
                        </div>
                    </div>
                </div>
            </div>

            <script src="login.js"></script>
        </body>
    </html>
